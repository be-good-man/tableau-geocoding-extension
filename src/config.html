<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geocoding Extension - Settings</title>
  <script src="https://cdn.jsdelivr.net/npm/@anthropic-ai/tableau-extensions-api@latest/lib/tableau.extensions.1.latest.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      padding: 24px;
      background: #fff;
    }
    h2 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #1a1a1a;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 13px;
      color: #555;
    }
    .form-group select,
    .form-group input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .form-group select:focus,
    .form-group input:focus {
      outline: none;
      border-color: #4e79a7;
      box-shadow: 0 0 0 2px rgba(78, 121, 167, 0.2);
    }
    .form-group .hint {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .hidden { display: none; }
    .button-row {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }
    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ccc;
    }
    .btn-secondary:hover { background: #e0e0e0; }
    .btn-primary {
      background: #4e79a7;
      color: #fff;
    }
    .btn-primary:hover { background: #3d6290; }
  </style>
</head>
<body>
  <h2>Geocoding Extension Settings</h2>

  <div class="form-group">
    <label for="providerSelect">Provider</label>
    <select id="providerSelect">
      <option value="">-- Select a provider --</option>
    </select>
  </div>

  <div class="form-group" id="apiKeyGroup">
    <label for="apiKeyInput">API Key</label>
    <input type="password" id="apiKeyInput" placeholder="Enter your API key">
    <div class="hint" id="apiKeyHint"></div>
  </div>

  <div class="form-group" id="noKeyMessage" class="hidden">
    <div class="hint">No API key required for this provider.</div>
  </div>

  <div class="form-group">
    <label for="paramSelect">Spatial Parameter</label>
    <select id="paramSelect">
      <option value="">-- Select a parameter --</option>
    </select>
    <div class="hint">Choose the workbook parameter that will receive the POINT geometry.</div>
  </div>

  <div class="button-row">
    <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
    <button class="btn btn-primary" id="saveBtn">Save</button>
  </div>
</body>
</html>
