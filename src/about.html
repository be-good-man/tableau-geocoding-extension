<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>About Tableau Geocode</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Benton Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      color: #333;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background: #fff;
    }
    .about-icon {
      width: 70px;
      height: 70px;
      margin-bottom: 16px;
    }
    .about-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .about-author {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
    }
    .about-description {
      font-size: 12px;
      color: #333;
      line-height: 1.5;
      margin-bottom: 16px;
      max-width: 320px;
    }
    .about-version {
      font-size: 11px;
      color: #999;
      margin-bottom: 16px;
    }
    .about-link {
      color: #1a6dff;
      text-decoration: none;
      font-size: 12px;
    }
    .about-link:hover {
      text-decoration: underline;
    }
    .btn {
      height: 32px;
      padding: 0 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      margin-top: 16px;
      background: #fff;
      border: 1px solid #c8c8c8;
      color: #333;
    }
    .btn:hover { background: #f0f0f0; border-color: #999; }
  </style>
  <script src="./lib/tableau.extensions.1.latest.js"></script>
</head>
<body>
  <img class="about-icon" src="./icons/icon_70.png" width="70" height="70" alt="Tableau Geocode">
  <div class="about-title">Tableau Geocode</div>
  <div class="about-author">by Benjamin Goodman</div>
  <div class="about-description">
    Geocode addresses and compute routes, writing results to spatial parameters as WKT geometry.
    Supports Google, Mapbox, Geoapify, Geocodio, and OSM/OSRM providers.
  </div>
  <div class="about-version">Version 1.0.0</div>
  <a class="about-link" href="https://github.com/be-good-man/tableau-geocoding-extension" target="_blank">Developer Website</a>
  <button class="btn" id="closeBtn">Close</button>
  <script>
    tableau.extensions.initializeDialogAsync().then(function() {
      document.getElementById('closeBtn').addEventListener('click', function() {
        tableau.extensions.ui.closeDialog('closed');
      });
    });
  </script>
</body>
</html>
