<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geocoding Extension</title>
  <script src="./lib/tableau.extensions.1.latest.js"></script>
</head>
<body>
  <div id="app">
    <!-- Status messages (errors, loading) -->
    <div id="statusContainer"></div>

    <!-- Main input row: Address + Locate + Recent + Settings -->
    <div class="input-row">
      <div class="input-wrapper">
        <input type="text" id="addressInput" placeholder="Enter an address or place name" autocomplete="off">
        <span class="success-check hidden" id="successCheck"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="7" fill="#16a34a"/><polyline points="4.5,8 7,10.5 11.5,5.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></span>
      </div>
      <button class="btn btn-primary" id="locateBtn">Locate</button>
      <button class="btn btn-icon btn-recent" id="recentBtn" title="Recent Requests"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5" fill="none"/><polyline points="8,4 8,8 11,10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg><span class="recent-count hidden" id="recentCount">0</span></button>
      <button class="btn btn-icon" id="settingsBtn" title="Settings"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.8 1.5h2.4l.3 1.8.9.4 1.5-1 1.7 1.7-1 1.5.4.9 1.8.3v2.4l-1.8.3-.4.9 1 1.5-1.7 1.7-1.5-1-.9.4-.3 1.8H6.8l-.3-1.8-.9-.4-1.5 1-1.7-1.7 1-1.5-.4-.9-1.8-.3V6.8l1.8-.3.4-.9-1-1.5 1.7-1.7 1.5 1 .9-.4.3-1.8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></button>
    </div>
  </div>
</body>
</html>
