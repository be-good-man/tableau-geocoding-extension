<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geocoding Extension</title>
  <style>.hidden { display: none !important; }</style>
  <script src="./lib/tableau.extensions.1.latest.js"></script>
</head>
<body>
  <div id="app">
    <!-- Loading state (visible until initializeAsync completes) -->
    <div id="loadingState" class="loading-state">
      <div class="loading-spinner"></div>
      <span class="loading-text">Loading...</span>
    </div>

    <!-- LOCATION MODE (default, hidden until loaded) -->
    <div id="locationMode" class="hidden">
      <div class="input-row">
        <!-- Toggle to Route mode -->
        <button class="btn btn-icon mode-toggle" id="toRouteBtn" title="Switch to Route mode" aria-label="Switch to Route mode">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="4" cy="12" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <circle cx="12" cy="4" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <path d="M5.5 10.5C7 9 9 7 10.5 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 2"/>
          </svg>
        </button>
        <div class="input-wrapper">
          <input type="text" id="addressInput" placeholder="Enter an address or place name" autocomplete="off" aria-label="Address or place name">
          <span class="success-check hidden" id="successCheck"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="7" fill="#16a34a"/><polyline points="4.5,8 7,10.5 11.5,5.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></span>
        </div>
        <button class="btn btn-primary" id="locateBtn">Locate</button>
        <button class="btn btn-icon btn-recent" id="recentBtn" title="Recent Requests" aria-label="Recent Requests"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5" fill="none"/><polyline points="8,4 8,8 11,10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg><span class="recent-count hidden" id="recentCount">0</span></button>
        <button class="btn btn-icon" id="settingsBtn" title="Settings" aria-label="Settings"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.8 1.5h2.4l.3 1.8.9.4 1.5-1 1.7 1.7-1 1.5.4.9 1.8.3v2.4l-1.8.3-.4.9 1 1.5-1.7 1.7-1.5-1-.9.4-.3 1.8H6.8l-.3-1.8-.9-.4-1.5 1-1.7-1.7 1-1.5-.4-.9-1.8-.3V6.8l1.8-.3.4-.9-1-1.5 1.7-1.7 1.5 1 .9-.4.3-1.8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></button>
        <button class="btn btn-icon btn-info" id="infoBtn" title="About Extension" aria-label="About Extension"><img src="./icons/icon_24.png" width="24" height="24" alt=""></button>
      </div>
    </div>

    <!-- ROUTE MODE (hidden by default) -->
    <div id="routeMode" class="hidden">
      <!-- Route grid layout: 3 columns -->
      <div class="route-grid">
        <!-- Col 1: Location mode toggle (spans both rows) -->
        <div class="route-col1">
          <button class="btn btn-icon mode-toggle" id="toLocationBtn" title="Switch to Location mode" aria-label="Switch to Location mode">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
              <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
              <line x1="8" y1="1" x2="8" y2="3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="8" y1="12.5" x2="8" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="1" y1="8" x2="3.5" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="12.5" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <!-- Col 2: Origin + Destination inputs -->
        <div class="route-col2">
          <div class="input-wrapper">
            <input type="text" id="originInput" placeholder="Origin" autocomplete="off" aria-label="Origin address">
            <span class="success-check hidden" id="originCheck"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="#16a34a"/><polyline points="4.5,8 7,10.5 11.5,5.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></span>
          </div>
          <div class="input-wrapper">
            <input type="text" id="destinationInput" class="dest-input" placeholder="Destination" autocomplete="off" aria-label="Destination address">
            <span class="success-check hidden" id="destinationCheck"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="#16a34a"/><polyline points="4.5,8 7,10.5 11.5,5.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></span>
          </div>
        </div>

        <!-- Col 3: Row 1 = history + settings, Row 2 = travel mode buttons -->
        <div class="route-col3">
          <div class="route-col3-row">
            <button class="btn btn-icon btn-recent" id="recentBtnRoute" title="Recent Requests" aria-label="Recent Requests"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5" fill="none"/><polyline points="8,4 8,8 11,10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg><span class="recent-count hidden" id="recentCountRoute">0</span></button>
            <button class="btn btn-icon" id="settingsBtnRoute" title="Settings" aria-label="Settings"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.8 1.5h2.4l.3 1.8.9.4 1.5-1 1.7 1.7-1 1.5.4.9 1.8.3v2.4l-1.8.3-.4.9 1 1.5-1.7 1.7-1.5-1-.9.4-.3 1.8H6.8l-.3-1.8-.9-.4-1.5 1-1.7-1.7 1-1.5-.4-.9-1.8-.3V6.8l1.8-.3.4-.9-1-1.5 1.7-1.7 1.5 1 .9-.4.3-1.8z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></button>
            <button class="btn btn-icon btn-info" id="infoBtnRoute" title="About Extension" aria-label="About Extension"><img src="./icons/icon_24.png" width="24" height="24" alt=""></button>
          </div>
          <div class="route-col3-row travel-mode-icons hidden" id="travelModeRow">
            <button type="button" class="btn btn-icon travel-mode-btn active" data-mode="DRIVE" title="Drive" aria-label="Drive">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 11V13.5C3 14 3.5 14 3.5 14H5C5 14 5.5 14 5.5 13.5V12.5H10.5V13.5C10.5 14 11 14 11 14H12.5C12.5 14 13 14 13 13.5V11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 7L5 4C5.2 3.4 5.7 3 6.3 3H9.7C10.3 3 10.8 3.4 11 4L12 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="7" width="10" height="4" rx="1" stroke="currentColor" stroke-width="1.3"/><circle cx="5" cy="9.5" r="0.75" fill="currentColor"/><circle cx="11" cy="9.5" r="0.75" fill="currentColor"/></svg>
            </button>
            <button type="button" class="btn btn-icon travel-mode-btn" data-mode="WALK" title="Walk" aria-label="Walk">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="3" r="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M6.5 6.5L7.5 9L6 12.5M9.5 6.5L8.5 9L10 12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.5 6.5H9.5L10.5 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button type="button" class="btn btn-icon travel-mode-btn" data-mode="BICYCLE" title="Bicycle" aria-label="Bicycle">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="4.5" cy="10.5" r="2.5" stroke="currentColor" stroke-width="1.3"/><circle cx="11.5" cy="10.5" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M4.5 10.5L6.5 5.5H9.5L11.5 10.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.5 5.5L8 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
      </div>
      <input type="hidden" id="travelModeSelect" value="DRIVE">
    </div>

    <!-- Status messages (below inputs) -->
    <div id="statusContainer" aria-live="polite" aria-atomic="true"></div>
  </div>
</body>
</html>
